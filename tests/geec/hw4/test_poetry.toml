[meta]
name = "translate_number_to_text"
file = "Lab4.py"
language = "python"
imports = ["helpers/check_translate.py"]

# Pre-call student function for property tests
[[setup]]
id = "t1"
function = "translate_number_to_text"
args = ["1"]

[[setup]]
id = "t2"
function = "translate_number_to_text"
args = ["2"]

[[setup]]
id = "t3"
function = "translate_number_to_text"
args = ["3"]

[[setup]]
id = "t5"
function = "translate_number_to_text"
args = ["5"]

[[setup]]
id = "t6"
function = "translate_number_to_text"
args = ["6"]

# --- Invalid input tests (exact match) ---
[[cases]]
name = "invalid: letters"
function = "translate_number_to_text"
args = ["123a45"]
expect = "错误：输入内容必须全部为数字。"

[[cases]]
name = "invalid: symbols"
function = "translate_number_to_text"
args = ["9-0"]
expect = "错误：输入内容必须全部为数字。"

[[cases]]
name = "invalid: spaces"
function = "translate_number_to_text"
args = ["1 2 3"]
expect = "错误：输入内容必须全部为数字。"

[[cases]]
name = "invalid: empty"
function = "translate_number_to_text"
args = [""]
expect = "错误：输入内容必须全部为数字。"

# --- Property tests (use in-process checkers) ---
[[cases]]
name = "concatenation: T(12) == T(1) + T(2)"
function = "translate_number_to_text"
args = ["12"]
check = { function = "check_concat" }

[[cases]]
name = "repetition: T(33) == T(3) + T(3)"
function = "translate_number_to_text"
args = ["33"]
check = { function = "check_repeat" }

[[cases]]
name = "all digits mapped"
function = "translate_number_to_text"
args = ["0123456789"]
check = { function = "check_all_mapped" }

[[cases]]
name = "unique: T(5) != T(6)"
function = "translate_number_to_text"
args = ["5"]
check = { function = "check_unique" }
