[meta]
name = "subway_system"
file = "final.py"
language = "python"
imports = ["helpers/subway.py"]

# Setup: load data using student's function, store for later cases
[[setup]]
id = "loaded_data"
function = "load_data"
args = ["$DATA_FILE"]

# --- load_data: verified by @checker("load_data") ---
[[cases]]
name = "load_data: builds valid structure"
function = "load_data"
args = ["$DATA_FILE"]

# --- get_station_id ---
[[cases]]
name = "get_station_id: 18号线 A站 -> 1"
function = "get_station_id"
args = ["$loaded_data", "18号线", "A站"]
expect = 1

[[cases]]
name = "get_station_id: 10号线 D站 -> 6"
function = "get_station_id"
args = ["$loaded_data", "10号线", "D站"]
expect = 6

[[cases]]
name = "get_station_id: nonexistent -> None"
function = "get_station_id"
args = ["$loaded_data", "不存在线路", "不存在站点"]
check = { rhai = "result == ()" }

# --- get_neighbors ---
[[cases]]
name = "get_neighbors: station 1 (A站, head)"
function = "get_neighbors"
args = ["$loaded_data", 1]
check = { rhai = "result.len() >= 1" }

[[cases]]
name = "get_neighbors: station 3 (国权路, transfer)"
function = "get_neighbors"
args = ["$loaded_data", 3]
check = { rhai = "result.contains(5) && result.contains(2)" }

[[cases]]
name = "get_neighbors: station 5 (国权路, transfer)"
function = "get_neighbors"
args = ["$loaded_data", 5]
check = { rhai = "result.contains(3) && result.contains(4)" }

# --- find_path ---
[[cases]]
name = "find_path: 1->6 (cross-line via transfer)"
function = "find_path"
args = ["$loaded_data", 1, 6, []]
check = { function = "check_find_path" }

[[cases]]
name = "find_path: 1->3 (same line)"
function = "find_path"
args = ["$loaded_data", 1, 3, []]
check = { rhai = "result.len() >= 2 && result[0] == 1" }

# --- format_path ---
[[cases]]
name = "format_path: cross-line includes transfer marker"
function = "format_path"
args = ["$loaded_data", [3, 5]]
check = { rhai = "result.contains(\"换乘\")" }
