[meta]
name = "parse_input_query"
file = "metro.py"
function = "parse_input_query"
language = "python"

[[cases]]
name = "basic comma"
args = ["1号线,人民广场"]
expect = ["1号线", "人民广场"]

[[cases]]
name = "with spaces"
args = [" 1号线 , 人民广场 "]
expect = ["1号线", "人民广场"]

[[cases]]
name = "fullwidth comma"
args = ["1号线，人民广场"]
expect = ["1号线", "人民广场"]

[[cases]]
name = "fullwidth comma with space"
args = ["1号线， 人民广场"]
expect = ["1号线", "人民广场"]
