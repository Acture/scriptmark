[meta]
name = "email_validation"
file = "email.py"
function = "is_valid_email"
language = "python"

# --- Valid ---
[[cases]]
name = "valid: simple@example.com"
args = ["simple@example.com"]
expect = true

[[cases]]
name = "valid: user.name@example.com"
args = ["user.name@example.com"]
expect = true

[[cases]]
name = "valid: user_name@example.com"
args = ["user_name@example.com"]
expect = true

[[cases]]
name = "valid: user-name@example.com"
args = ["user-name@example.com"]
expect = true

[[cases]]
name = "valid: user+tag@example.com"
args = ["user+tag@example.com"]
expect = true

[[cases]]
name = "valid: 123456@example.com"
args = ["123456@example.com"]
expect = true

[[cases]]
name = "valid: user@fudan.edu.cn"
args = ["user@fudan.edu.cn"]
expect = true

# --- Invalid ---
[[cases]]
name = "invalid: no @"
args = ["plainaddress"]
expect = false

[[cases]]
name = "invalid: no dot in domain"
args = ["user@localhost"]
expect = false

[[cases]]
name = "invalid: no local part"
args = ["@example.com"]
expect = false

[[cases]]
name = "invalid: no domain"
args = ["user@"]
expect = false

[[cases]]
name = "invalid: dot at domain start"
args = ["user@.com"]
expect = false

[[cases]]
name = "invalid: space in local"
args = ["user name@example.com"]
expect = false

[[cases]]
name = "invalid: space in domain"
args = ["user@ex ample.com"]
expect = false

[[cases]]
name = "invalid: # in domain"
args = ["user@example.c#m"]
expect = false

[[cases]]
name = "invalid: ! in local"
args = ["user!name@example.com"]
expect = false
