[meta]
name = "strip_html"
file = "html.py"
function = "strip_html"
language = "python"

[[cases]]
name = "p tag"
args = ["<p>Hello World</p>"]
expect = "Hello World"

[[cases]]
name = "b tag"
args = ["<b>Bold</b>"]
expect = "Bold"

[[cases]]
name = "a tag with href"
args = ["<a href=\"index.htm\">Link</a>"]
expect = "Link"

[[cases]]
name = "div with attributes"
args = ["<div id=\"main\" class=\"test\">Text</div>"]
expect = "Text"

[[cases]]
name = "br tag"
args = ["Hello<br>World"]
expect = "HelloWorld"

[[cases]]
name = "img tag"
args = ["Image <img src='x.jpg'>"]
expect = "Image "

[[cases]]
name = "nested tags"
args = ["<div><p>Text</p></div>"]
expect = "Text"

[[cases]]
name = "plain text"
args = ["Just plain text"]
expect = "Just plain text"

[[cases]]
name = "empty string"
args = [""]
expect = ""
