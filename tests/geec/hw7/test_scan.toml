[meta]
name = "scan_effect"
file = "scan.py"
function = "calculate_scan_effect"
language = "python"

[[cases]]
name = "single char"
args = ["A"]
expect = "-----"

[[cases]]
name = "empty string"
args = [""]
expect = "-----"

[[cases]]
name = "Hi (2 chars)"
args = ["Hi"]
check = { rhai = "result.contains(\"-----\") && result.contains(\"H\") && result.contains(\"i\")" }

[[cases]]
name = "Test (4 chars)"
args = ["Test"]
check = { rhai = "result.contains(\"-----\") && result.len() > 10" }
