[meta]
name = "word_similarity"
file = "similar.py"
function = "are_words_similar"
language = "python"

[[cases]]
name = "listen vs silent"
args = ["listen", "silent"]
expect = true

[[cases]]
name = "listen vs silenta"
args = ["listen", "silenta"]
expect = false

[[cases]]
name = "team vs meat"
args = ["team", "meat"]
expect = true

[[cases]]
name = "restful vs fluster"
args = ["restful", "fluster"]
expect = true

[[cases]]
name = "hello vs olelh"
args = ["hello", "olelh"]
expect = true

[[cases]]
name = "apple vs aple"
args = ["apple", "aple"]
expect = true

[[cases]]
name = "hello vs helo"
args = ["hello", "helo"]
expect = false

[[cases]]
name = "program vs function"
args = ["program", "function"]
expect = false

[[cases]]
name = "a vs b"
args = ["a", "b"]
expect = false

[[cases]]
name = "empty vs empty"
args = ["", ""]
expect = true

[[cases]]
name = "abc vs empty"
args = ["abc", ""]
expect = false

[[cases]]
name = "test vs testing"
args = ["test", "testing"]
expect = false
