[meta]
name = "diamond"
file = "diamond.py"
function = "generate_diamond_string"
language = "python"

[[cases]]
name = "n=1"
args = [1]
check = { rhai = "result.trim() == \"*\"" }

[[cases]]
name = "n=2 (3 rows)"
args = [2]
check = { rhai = "result.contains(\"* * *\")" }

[[cases]]
name = "n=3 (5 rows)"
args = [3]
check = { rhai = "result.contains(\"* * *\") && result.len() > 10" }

[[cases]]
name = "n=0 returns None"
args = [0]
check = { rhai = "result == ()" }

[[cases]]
name = "n=-2 returns None"
args = [-2]
check = { rhai = "result == ()" }
