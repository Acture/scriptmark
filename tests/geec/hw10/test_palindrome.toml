[meta]
name = "palindrome"
file = "Palindrome.py"
language = "python"

# --- f2: check palindrome (exact match) ---
[[cases]]
name = "f2: abba is palindrome"
function = "f2"
args = ["abba"]
expect = true

[[cases]]
name = "f2: abcba is palindrome"
function = "f2"
args = ["abcba"]
expect = true

[[cases]]
name = "f2: level is palindrome"
function = "f2"
args = ["level"]
expect = true

[[cases]]
name = "f2: single char"
function = "f2"
args = ["a"]
expect = true

[[cases]]
name = "f2: empty string"
function = "f2"
args = [""]
expect = true

[[cases]]
name = "f2: abcd not palindrome"
function = "f2"
args = ["abcd"]
expect = false

[[cases]]
name = "f2: ab not palindrome"
function = "f2"
args = ["ab"]
expect = false

[[cases]]
name = "f2: abab not palindrome"
function = "f2"
args = ["abab"]
expect = false

# --- f1: make palindrome (property-based, needs checker) ---
[[cases]]
name = "f1: abcd"
function = "f1"
args = ["abcd"]
check = { rhai = "let r = result; let n = r.len(); r.len() >= 4 && r.len() <= 8 && r.sub_string(0, 4) == \"abcd\"" }

[[cases]]
name = "f1: race"
function = "f1"
args = ["race"]
check = { rhai = "let r = result; r.len() >= 4 && r.len() <= 8 && r.sub_string(0, 4) == \"race\"" }

[[cases]]
name = "f1: x (single)"
function = "f1"
args = ["x"]
check = { rhai = "result.len() >= 1 && result.len() <= 2" }

[[cases]]
name = "f1: empty"
function = "f1"
args = [""]
check = { rhai = "result.len() == 0" }
