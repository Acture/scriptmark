expect = false

[[cases]]
name = "1700: div by 100, not 400 -> not leap"
args = [1700]
expect = false

[[cases]]
name = "2100: div by 100, not 400 -> not leap"
args = [2100]
expect = false

[[cases]]
name = "2023: not div by 4 -> not leap"
args = [2023]
expect = false

[[cases]]
name = "2025: not div by 4 -> not leap"
args = [2025]
expect = false

[[cases]]
