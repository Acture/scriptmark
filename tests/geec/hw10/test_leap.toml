[meta]
name = "leap_year"
file = "Leap.py"
function = "isLeap"
language = "python"

[[cases]]
name = "2000: div by 400 -> leap"
args = [2000]
expect = true

[[cases]]
name = "1600: div by 400 -> leap"
args = [1600]
expect = true

[[cases]]
name = "2024: div by 4, not 100 -> leap"
