name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: scriptmark
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: scriptmark
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: scriptmark
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: scriptmark
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: scriptmark.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p scriptmark-cli --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scriptmark-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  wheels:
    name: Wheel ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: Publish
    needs: [build, wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: scriptmark-*

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: wheel-*
          merge-multiple: true

      - name: Organize release assets
        run: |
          mkdir -p release
          cp artifacts/scriptmark-x86_64-unknown-linux-gnu/scriptmark release/scriptmark-linux-x86_64
          cp artifacts/scriptmark-aarch64-unknown-linux-gnu/scriptmark release/scriptmark-linux-aarch64
          cp artifacts/scriptmark-x86_64-apple-darwin/scriptmark release/scriptmark-macos-x86_64
          cp artifacts/scriptmark-aarch64-apple-darwin/scriptmark release/scriptmark-macos-aarch64
          cp artifacts/scriptmark-x86_64-pc-windows-msvc/scriptmark.exe release/scriptmark-windows-x86_64.exe
          chmod +x release/scriptmark-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          for crate in scriptmark-core scriptmark-runner scriptmark-db scriptmark-canvas scriptmark-tui scriptmark-cli; do
            cargo publish -p "$crate" --no-verify
            sleep 30
          done

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --skip-existing wheels/*.whl
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
